<style>

body{

    background:#f3f3f3;

}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
}

.section{

}

label{

input[type=text],

.checkbox-group{

.checkbox-group label{

}

.submit-btn{

    background:#111;
    color:white;
    border-radius:8px;

}

.submit-btn:hover{
    background:#333;
}

.back-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:#111;
    padding:10px 15px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

document.getElementById("form").addEventListener("submit", async function(e){

    e.preventDefault();

    const submitButton =
        document.querySelector(".submit-btn");

    submitButton.disabled = true;
    submitButton.innerText = "Uploading...";

    try{

        // =========================
        // フォームデータ取得
        // =========================

        const yourName =
            document.getElementById("yourName").value;

        const assignmentName =

        const mail =
            document.getElementById("mail").value;

        const personnel =

        const numbering =

            document.getElementById("playType").value;

        const otherKeyword =
            document.getElementById("otherKeyword").value;

        // =========================
        // Keywords取得
        // =========================

        const keywords =
            Array.from(
                document.querySelectorAll(
                    'input[type="checkbox"]:checked'
                )
            )
            .map(cb => cb.value)
            .join(", ");

        // =========================
        // 画像取得
        // =========================

        const imageFile =
            document.getElementById("image").files[0];

        if(!imageFile){

            alert("Please select an image.");

            submitButton.disabled = false;
            submitButton.innerText = "SUBMIT";

            return;

        }

        // =========================
        // Cloudinary Upload
        // =========================

        const formData = new FormData();

        formData.append("file", imageFile);

        formData.append(
            "upload_preset",
            UPLOAD_PRESET
        );

        const uploadResponse =
            await fetch(
                `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
                {
                    method:"POST",
                    body:formData
                }
            );

        const uploadResult =
            await uploadResponse.json();

        console.log(uploadResult);

        if(!uploadResult.secure_url){

            alert("Cloudinary Upload Failed");

            submitButton.disabled = false;
            submitButton.innerText = "SUBMIT";

            return;

        }

        const imageUrl =
            uploadResult.secure_url;

        // =========================

    SCRIPT_URL,
    {
        method:"POST",
        mode:"no-cors",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({

            yourName,
            assignmentName,
            mail,
            personnel,
            numbering,
            playType,
            keywords,
            otherKeyword,
            imageUrl

        })
    }
);

</script>
