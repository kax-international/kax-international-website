<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAX DATABASE</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.search-area{
    text-align:center;
    padding:20px;
}

#searchInput{
    width:400px;
    max-width:90%;
    padding:12px;
}

#gallery{
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<header>
    <h1>KAX DATABASE</h1>
</header>

<div class="search-area">
    <input
        type="text"
        id="searchInput"
        placeholder="Search..."
    >
</div>

<div id="gallery">
Loading...
</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2rFzA-udsqKKh5FHf9-naLtllz9qpM6cm9JiugzGLh9FrGSnGbKrfxX0Puf0lzSBI5dxVMTm91Ndn/pub?output=csv";

async function loadData(){

    try{

        const response = await fetch(CSV_URL);
        const text = await response.text();

        document.getElementById("gallery").innerHTML =
        "<pre>" + text + "</pre>";

    }catch(error){

        document.getElementById("gallery").innerHTML =
        "CSV読み込み失敗";

        console.error(error);

    }

}

loadData();

</script>

loadData();
