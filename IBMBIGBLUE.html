<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBM BIG BLUE 2026 OFFENSE</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.search-area{
    text-align:center;
    padding:20px;
}

#searchInput{
    width:500px;
    max-width:90%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(500px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,.2);
}

.image-container{
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    overflow:hidden;
    border-bottom:1px solid #ddd;
}

.image-container img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
}

.info{
    padding:15px;
}

.info h2{
    margin-top:0;
    margin-bottom:15px;
}

.info p{
    margin:8px 0;
}

</style>

</head>

<body>

<header>
    <h1>KAX DATABASE</h1>
</header>

<div class="search-area">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Play Name, Personnel, Keywords..."
    >

</div>

<div id="gallery">

    Loading...

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2rFzA-udsqKKh5FHf9-naLtllz9qpM6cm9JiugzGLh9FrGSnGbKrfxX0Puf0lzSBI5dxVMTm91Ndn/pub?output=csv";

const gallery = document.getElementById("gallery");
const searchInput = document.getElementById("searchInput");

let allData = [];

function parseCSVLine(line){

    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0;i<line.length;i++){

        const char = line[i];

        if(char === '"'){

            insideQuotes = !insideQuotes;

        }else if(char === "," && !insideQuotes){

            result.push(current);
            current = "";

        }else{

            current += char;

        }
    }

    result.push(current);

    return result;
}

function convertDriveUrl(url){

    if(!url) return "";

    let fileId = "";

    if(url.includes("open?id=")){

        fileId = url.split("open?id=")[1];

    }else{

        const match = url.match(/\/d\/([^\/]+)/);

        if(match){

            fileId = match[1];

        }
    }

    if(!fileId) return "";

    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1600`;
}

async function loadData(){

    try{

        const response = await fetch(CSV_URL);
        const text = await response.text();

        const rows =
            text
            .trim()
            .split("\n");

        allData =
            rows.slice(1).map(row => {

                const cols = parseCSVLine(row);

                return {

                    timestamp: cols[0] || "",
                    yourName: cols[1] || "",
                    assignmentName: cols[2] || "",
                    mail: cols[3] || "",
                    numbering: cols[4] || "",
                    playType: cols[5] || "",
                    keywords: cols[6] || "",
                    image: cols[7] || "",
                    personnel: cols[8] || ""

                };

            });

        render(allData);

    }catch(error){

        console.error(error);

        gallery.innerHTML =
        "<h2>Failed to load spreadsheet</h2>";

    }

}

function render(data){

    gallery.innerHTML = "";

    data.forEach(item => {

        const card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="image-container">

                <img
                    src="${convertDriveUrl(item.image)}"
                    alt="${item.assignmentName}"
                >

            </div>

            <div class="info">

                <h2>${item.assignmentName}</h2>

                <p>
                    <strong>Play Type:</strong>
                    ${item.playType}
                </p>

                <p>
                    <strong>Keywords:</strong>
                    ${item.keywords}
                </p>

                <p>
                    <strong>Numbering:</strong>
                    ${item.numbering}
                </p>

                <p>
                    <strong>Personnel:</strong>
                    ${item.personnel}
                </p>

                <p>
                    <strong>Submitted By:</strong>
                    ${item.yourName}
                </p>

            </div>

        `;

        gallery.appendChild(card);

    });

}

searchInput.addEventListener("input", () => {

    const keyword =
        searchInput.value.toLowerCase();

    const filtered =
        allData.filter(item =>

            item.assignmentName.toLowerCase().includes(keyword)

            ||

            item.playType.toLowerCase().includes(keyword)

            ||

            item.keywords.toLowerCase().includes(keyword)

            ||

            item.personnel.toLowerCase().includes(keyword)

            ||

            item.numbering.toLowerCase().includes(keyword)

        );

    render(filtered);

});

loadData();

</script>

</body>
</html>
