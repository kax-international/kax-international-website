<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAX DATABASE</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.search-area{
    text-align:center;
    padding:20px;
}

#searchInput{
    width:400px;
    max-width:90%;
    padding:12px;
}

#gallery{
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<header>
    <h1>KAX DATABASE</h1>
</header>

<div class="search-area">
    <input
        type="text"
        id="searchInput"
        placeholder="Search..."
    >
</div>

<div id="gallery">
Loading...
</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2rFzA-udsqKKh5FHf9-naLtllz9qpM6cm9JiugzGLh9FrGSnGbKrfxX0Puf0lzSBI5dxVMTm91Ndn/pub?output=csv";

const gallery =
document.getElementById("gallery");

const searchInput =
document.getElementById("searchInput");

let allData = [];

function driveToImage(url){

    const match =
        url.match(/id=([^&]+)/);

    if(match){

        return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;

    }

    return url;
}

async function loadData(){

    const response =
        await fetch(CSV_URL);

    const text =
        await response.text();

    const rows =
        text.trim().split("\n");

    allData =
        rows.slice(1).map(row=>{

            const cols =
                row.split(",");

            return {

                assignmentName: cols[2] || "",
                numbering: cols[4] || "",
                playType: cols[5] || "",
                keywords: cols[6] || "",
                image: cols[7] || "",
                personnel: cols[8] || "",
                yourName: cols[1] || ""

            };

        });

    render(allData);

}

function render(data){

    gallery.innerHTML = "";

    data.forEach(item=>{

        const imageUrl =
            driveToImage(item.image);

        const card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <img
                src="${imageUrl}"
                style="
                width:100%;
                height:250px;
                object-fit:cover;
                "
            >

            <div style="padding:15px">

                <h2>
                    ${item.assignmentName}
                </h2>

                <p>
                    <b>Play Type:</b>
                    ${item.playType}
                </p>

                <p>
                    <b>Keywords:</b>
                    ${item.keywords}
                </p>

                <p>
                    <b>Numbering:</b>
                    ${item.numbering}
                </p>

                <p>
                    <b>Personnel:</b>
                    ${item.personnel}
                </p>

            </div>

        `;

        gallery.appendChild(card);

    });

}

searchInput.addEventListener("input",()=>{

    const keyword =
        searchInput.value.toLowerCase();

    const filtered =
        allData.filter(item =>

            item.assignmentName
            .toLowerCase()
            .includes(keyword)

            ||

            item.playType
            .toLowerCase()
            .includes(keyword)

            ||

            item.keywords
            .toLowerCase()
            .includes(keyword)

            ||

            item.personnel
            .toLowerCase()
            .includes(keyword)

        );

    render(filtered);

});

loadData();

</script>
