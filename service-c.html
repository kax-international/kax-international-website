<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBM BIG BLUE PLAY SUBMISSION</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

.container{
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="text"]{
    width:100%;
    padding:12px;
    box-sizing:border-box;
}

input[type="file"]{
    width:100%;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    background:#111;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

#preview{
    margin-top:20px;
    text-align:center;
}

#preview img{
    max-width:100%;
    max-height:400px;
}

</style>

</head>

<body>

<div class="container">

    <h1>IBM BIG BLUE PLAY SUBMISSION</h1>

    <form id="playForm">

        <label>Assignment Name</label>
        <input type="text" id="assignmentName">

        <label>Numbering</label>
        <input type="text" id="numbering">

        <label>Play Type</label>
        <input type="text" id="playType">

        <label>Personnel</label>
        <input type="text" id="personnel">

        <label>Keywords</label>
        <input type="text" id="keywords">

        <label>Upload Image</label>
        <input
            type="file"
            id="imageFile"
            accept="image/*"
        >

        <div id="preview"></div>

        <button type="submit">
            SUBMIT
        </button>

    </form>

</div>

<script>

const imageFile =
document.getElementById("imageFile");

const preview =
document.getElementById("preview");

imageFile.addEventListener("change",e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = function(event){

        preview.innerHTML =
        `<img src="${event.target.result}">`;

    };

    reader.readAsDataURL(file);

});

document
.getElementById("playForm")
.addEventListener("submit",e=>{

    e.preventDefault();

    alert(
        "Version 1 Complete\n\nNext Step:\nCloudinary Upload"
    );

});

</script>

</body>
</html>
