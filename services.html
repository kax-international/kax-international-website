<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Services</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      position: relative;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0;
      letter-spacing: 2px;
    }

    .logo {
      position: absolute;
      top: 20px;
      right: 30px;
      width: 70px;
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.1);
    }

    .container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #333;
    }

    a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
    }

    .coming-soon {
      color: #aaa;
      cursor: default;
    }

    .back {
      display: inline-block;
      margin-top: 40px;
      padding: 10px 20px;
      background: #111;
      color: #fff;
      border-radius: 6px;
      text-align: center;
      transition: 0.3s;
    }

    .back:hover {
      background: #333;
      transform: translateY(-2px);
    }

    .back i {
      margin-right: 8px;
    }

    .back-wrapper {
      text-align: center;
    }
  </style>
</head>

<body>
