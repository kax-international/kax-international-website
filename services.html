<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Services</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0;
      letter-spacing: 2px;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #333;
    }

    a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
    }

    .back {
      display: block;
      margin-top: 40px;
      text-align: center;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <h1>Our Services</h1>
  </header>

  <div class="container">
    <div class="grid">
      <div class="card">
        <a href="service-a.html">Service A</a>
      </div>
      <div class="card">
        <a href="service-b.html">Service B</a>
      </div>
      <div class="card">
        <a href="service-c.html">Service C</a>
      </div>
    </div>

    <a href="index.html" class="back">← Back to Home</a>
  </div>

</body>
</html>
