<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    padding:15px 20px;
    font-weight:bold;
}

/* GRID */
#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:0.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,.2);
}

/* IMAGE */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#eee;
}

/* INFO */
.info{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.meta{
    font-size:13px;
    color:#666;
    line-height:1.6;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    overflow:auto;
}

.modal-content{
    background:white;
    width:95%;
    max-width:1200px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
}

#modalImage{
    width:100%;
    max-height:70vh;
    object-fit:contain;
    background:#000;
}

#close{
    float:right;
    font-size:32px;
    cursor:pointer;
}

.video{
    width:100%;
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    ATHLETIC CLOUD - BIG BLUE STYLE MAP
</header>

<div id="gallery">Loading...</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span id="close">&times;</span>

        <img id="modalImage">

        <div id="modalInfo"></div>

        <div id="modalVideo"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");

let responses = [];

/* AUTH */
onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = "login.html";
        return;
    }

    await load();
});

/* LOAD DATA */
async function load(){

    const q = query(
        collection(db, "assignmentResponses"),
        where("assignmentId", "==", assignmentId)
    );

    const snap = await getDocs(q);

    responses = [];

    snap.forEach(d => {
        responses.push({
            id: d.id,
            ...d.data()
        });
    });

    render();
}

/* GET FIRST IMAGE */
function getImage(r){
    for(const k in r.answers){
        const v = r.answers[k];
        if(typeof v === "string" && v.startsWith("http")){
            return v;
        }
    }
    return "https://via.placeholder.com/600x400?text=No+Image";
}

/* TITLE = Q0 */
function getTitle(r){
    return r.answers?.[0] || r.userName || "Untitled";
}

/* RENDER GRID */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    responses.forEach(r => {

        const card = document.createElement("div");
        card.className = "card";

        const img = getImage(r);
        const title = getTitle(r);

        card.innerHTML = `
            <img src="${img}">
            <div class="info">
                <div class="title">${title}</div>
                <div class="meta">
                    ${r.userName || ""}<br>
                    ${new Date(r.createdAt?.seconds*1000 || Date.now()).toLocaleString()}
                </div>
            </div>
        `;

        card.onclick = () => openModal(r);

        gallery.appendChild(card);
    });
}

/* MODAL */
function openModal(r){

    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImage");
    const info = document.getElementById("modalInfo");
    const video = document.getElementById("modalVideo");

    img.src = getImage(r);

    let html = `<h2>${getTitle(r)}</h2>`;

    for(const k in r.answers){
        html += `<p><b>Q${k}:</b> ${JSON.stringify(r.answers[k])}</p>`;
    }

    info.innerHTML = html;

    /* video (最後に表示) */
    let videoHtml = "";

    for(const k in r.answers){
        const v = r.answers[k];
        if(typeof v === "string" && v.includes("video")){
            videoHtml += `
                <video class="video" controls>
                    <source src="${v}">
                </video>
            `;
        }
    }

    video.innerHTML = videoHtml;

    modal.style.display = "block";
}

document.getElementById("close").onclick = () => {
    document.getElementById("modal").style.display = "none";
};

window.onclick = (e) => {
    if(e.target.id === "modal"){
        document.getElementById("modal").style.display = "none";
    }
};

</script>

</body>
</html>
