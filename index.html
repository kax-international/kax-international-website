<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KAX-INTERNATIONAL</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #333, #fff);
      color: #111;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    p {
      margin-top: 10px;
    }

    a.button {
      display: inline-block;
      padding: 12px 24px;
      margin-top: 20px;
      color: #111;
      background: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.3s;
    }

    a.button:hover {
      background: #ddd;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KAX-INTERNATIONAL</h1>
    <a href="services.html" class="button">View Services</a>
  </div>
</body>
</html>
