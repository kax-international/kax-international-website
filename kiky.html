<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Kiky</title>

  <!-- Font Awesome（SNSアイコン） -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff, #fff);
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 30px;
    }

    .sns {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .sns a {
      font-size: 1.8rem;
      color: #111;
      transition: 0.3s;
    }

    .sns a:hover {
      transform: scale(1.2);
      color: #aaa;
    }

    .back {
      display: inline-block;
      padding: 10px 20px;
      background: #fff;
      color: #111;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .back:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Kiky</h1>

    <p>
      インフルエンサーとして活動し、SNSを中心に多くのフォロワーへ<br>
      ライフスタイルや価値ある情報を発信しています。
    </p>

    <div class="sns">
      <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="#" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://www.youtube.com/@Kouneune" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>

    <a href="services.html" class="back">← Back to Services</a>
  </div>
</body>
</html>
